[global]
flavor = "gfm"
exclude = [
    "DESKTOP-ARCHITECTURE-RECONCILIATION-REVIEW.md",
    "docs/superpowers/**",
]
respect_gitignore = true

[per-file-ignores]
# The historical changelog predates the public-doc formatting rules. Keep all
# other checks active while allowing its legacy spacing, repeated section
# headings, and preserved long release notes.
"CHANGELOG.md" = ["MD012", "MD013", "MD024", "MD076"]

[MD013]
line_length = 100
code_blocks = false
tables = false

[MD041]
level = 1
front-matter-title = "title"
front-matter-title-pattern = "^(title|header):"
fix = false
