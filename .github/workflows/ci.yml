name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root:
    name: Root crate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --locked --all-targets --all-features

      - name: Test
        run: cargo test --locked --all-features

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Check Wasm
        run: cargo check --locked --target wasm32-unknown-unknown --all-features --lib --examples

      - name: Check rustdoc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --no-deps --all-features

  desktop:
    name: Desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: examples/desktop-multiwindow -> target

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update &&
          sudo apt-get install --yes
          libwebkit2gtk-4.1-dev
          libgtk-3-dev
          libsoup-3.0-dev
          libxdo-dev

      - name: Check desktop targets
        run: cargo check --locked --manifest-path examples/desktop-multiwindow/Cargo.toml --all-targets

      - name: Test desktop crate
        run: cargo test --locked --manifest-path examples/desktop-multiwindow/Cargo.toml

      - name: Build desktop binaries
        run: cargo build --locked --manifest-path examples/desktop-multiwindow/Cargo.toml --bins
