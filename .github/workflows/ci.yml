name: CI

on:
  push:
    branches: [development]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --features serde

      - name: Clippy
        run: cargo clippy --features serde --all-targets -- -D warnings

  desktop:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # dioxus-desktop's system libraries, as documented in
      # examples/desktop-multiwindow/Cargo.toml.
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev libxdo-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --features "serde desktop"

      - name: Clippy
        run: cargo clippy --features "serde desktop" --all-targets -- -D warnings
