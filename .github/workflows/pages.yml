name: Deploy gallery

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install stable Rust and the web target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown --toolchain stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --version 0.7.9 --locked

      - name: Build gallery
        run: dx build --example gallery --platform web --features web --release --base-path /dioxus-dnd/

      # GitHub Pages serves 404.html for unknown paths; serving the app
      # there lets dioxus-router handle deep links like /itinerary.
      - name: SPA fallback for deep links
        run: cp target/dx/gallery/release/web/public/index.html target/dx/gallery/release/web/public/404.html

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: target/dx/gallery/release/web/public

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
