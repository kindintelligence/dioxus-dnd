name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: validate-release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal

      - name: Validate tag, manifest, lockfiles, and changelog
        id: metadata
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          then
            echo "Release tags must use vMAJOR.MINOR.PATCH"
            exit 1
          fi

          version=$(cargo +stable metadata --locked --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "dioxus-dnd") | .version')
          expected_tag="v${version}"

          if [[ "$GITHUB_REF_NAME" != "$expected_tag" ]]
          then
            echo "Tag $GITHUB_REF_NAME does not match Cargo.toml version $version"
            exit 1
          fi

          if ! grep -Eq "^## ${version} - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md
          then
            echo "CHANGELOG.md has no dated ${version} release heading"
            exit 1
          fi

          cargo +stable metadata --locked --no-deps --format-version 1 \
            --manifest-path examples/desktop-multiwindow/Cargo.toml >/dev/null
          cargo +stable metadata --locked --no-deps --format-version 1 \
            --manifest-path examples/desktop-showcase/Cargo.toml >/dev/null

          git fetch origin main
          if [[ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]]
          then
            echo "Release tags must point at the current main branch head"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

  verify:
    name: release-gate
    needs: validate
    uses: ./.github/workflows/ci.yml

  publish:
    name: publish-crates-io
    needs: [validate, verify]
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal

      - name: Build the exact crate payload
        run: cargo +stable package --locked

      - name: Check whether this exact payload is already published
        id: registry
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          api_url="https://crates.io/api/v1/crates/dioxus-dnd/${VERSION}"
          status=$(curl --silent --show-error \
            --user-agent "dioxus-dnd-release-workflow (https://github.com/kindintelligence/dioxus-dnd)" \
            --output crates-io-version.json \
            --write-out '%{http_code}' \
            "$api_url")

          if [[ "$status" == "404" ]]
          then
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$status" != "200" ]]
          then
            echo "crates.io returned HTTP $status"
            exit 1
          fi

          local_checksum=$(sha256sum "target/package/dioxus-dnd-${VERSION}.crate" \
            | cut -d ' ' -f 1)
          published_checksum=$(jq -r '.version.checksum' crates-io-version.json)

          if [[ "$local_checksum" != "$published_checksum" ]]
          then
            echo "Published ${VERSION} exists but its checksum differs from this tag"
            exit 1
          fi

          echo "The exact ${VERSION} crate payload is already published"
          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Authenticate to crates.io with OIDC
        if: steps.registry.outputs.published != 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish to crates.io
        if: steps.registry.outputs.published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo +stable publish --locked

  github-release:
    name: github-release
    needs: [validate, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Extract curated release notes
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          awk -v heading="## ${VERSION} - " '
            index($0, heading) == 1 { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]
          then
            echo "No release notes found for ${VERSION}"
            exit 1
          fi

      - name: Create or refresh the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1
          then
            gh release edit "$GITHUB_REF_NAME" \
              --title "dioxus-dnd ${VERSION}" \
              --notes-file release-notes.md \
              --latest
          else
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --title "dioxus-dnd ${VERSION}" \
              --notes-file release-notes.md \
              --latest
          fi
