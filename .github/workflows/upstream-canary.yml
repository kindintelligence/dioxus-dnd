# The stable lane answers whether a released Dioxus 0.7 patch broke users.
# The git-main lane answers whether the next Dioxus line is still source
# compatible. Stable failures stay red. Git-main failures are informational
# because upstream main is allowed to change before a release.

name: upstream-canary

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  latest-published-patch:
    name: latest published Dioxus 0.7
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install desktop system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal

      - name: Float the Dioxus 0.7 family to current published patches
        run: |
          grep -oP '(?<=^name = ")dioxus[^"]*' Cargo.lock \
            | sort -u \
            | xargs -r cargo update
          git diff --stat Cargo.lock

      - name: Test core and serde
        run: cargo test --features serde

      - name: Test desktop
        run: cargo test --features "serde desktop"

  git-main:
    name: Dioxus git main, informational
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install desktop system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal

      - name: Select Dioxus git main packages
        run: |
          cargo add dioxus \
            --git https://github.com/DioxusLabs/dioxus \
            --branch main \
            --no-default-features \
            --features minimal,document
          cargo add dioxus-desktop \
            --git https://github.com/DioxusLabs/dioxus \
            --branch main \
            --optional
          cargo add --dev dioxus \
            --git https://github.com/DioxusLabs/dioxus \
            --branch main \
            --no-default-features \
            --features minimal,launch,web,document,mounted,router
          cargo add --dev dioxus-ssr \
            --git https://github.com/DioxusLabs/dioxus \
            --branch main

      - name: Record the upstream revision
        run: |
          cargo metadata --format-version 1 \
            | jq -r '.packages[] | select(.name == "dioxus" and ((.source // "") | startswith("git+"))) | "\(.name) \(.version) \(.source)"'

      - name: Test the full Rust suite against git main
        run: cargo test --all-features
